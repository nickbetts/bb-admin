name: Vercel Build Monitor

# ─────────────────────────────────────────────────────────────────────────────
# Model selection — change MODEL_NAME to swap the GitHub Models model used for
# /fix suggestions. Must be a model available via GitHub Models
# (https://github.com/marketplace/models). No external API key is required;
# the built-in GITHUB_TOKEN is used.
#
# Current choice: gpt-4.1 — GitHub's latest flagship GPT model, optimised for
# code-heavy tasks. Strong instruction following and large context window make
# it ideal for analysing verbose Vercel build logs.
# Other good options: o4-mini, gpt-4o, gpt-4.1-mini
# ─────────────────────────────────────────────────────────────────────────────
env:
  MODEL_NAME: gpt-4.1

# ─────────────────────────────────────────────────────────────────────────────
# Trigger 1 – deployment_status
#   Vercel's GitHub app automatically creates/updates a GitHub deployment status
#   for every build it runs. This event fires each time that status changes.
#
# Trigger 2 – issue_comment
#   When you reply "/fix" on an issue that has the "vercel-failure" label, the
#   AI Fix Suggestion job runs and posts a Copilot-generated fix suggestion.
# ─────────────────────────────────────────────────────────────────────────────
on:
  deployment_status:
  issue_comment:
    types: [created]

permissions:
  issues: write      # create/comment on issues
  contents: read     # checkout for context
  models: read       # GitHub Models API (Copilot) for /fix suggestions

jobs:
  # ───────────────────────────────────────────────────────────────────────────
  # JOB 1 · Detect a failed Vercel deployment → open a GitHub issue with logs
  # ───────────────────────────────────────────────────────────────────────────
  on-deployment-failure:
    name: Detect Failure & Open Issue
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'deployment_status' &&
      github.event.deployment_status.state == 'failure'

    steps:
      - name: Ensure jq is available
        run: |
          if ! command -v jq &>/dev/null; then
            echo "jq not found — installing…"
            sudo apt-get update -qq && sudo apt-get install -y -qq jq
          else
            echo "jq $(jq --version) found."
          fi

      - name: Fetch build logs from Vercel API
        id: vercel
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          # ── Guard: missing VERCEL_TOKEN ──────────────────────────────────
          if [[ -z "$VERCEL_TOKEN" ]]; then
            echo "has_token=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "has_token=true" >> "$GITHUB_OUTPUT"

          TARGET_URL="${{ github.event.deployment_status.target_url }}"

          # Strip the https:// so we can use the hostname as the Vercel API key
          URL_HOST=$(echo "$TARGET_URL" | sed 's|https://||')
          echo "Querying Vercel deployment for host: $URL_HOST"

          # Resolve the internal deployment ID from the preview URL
          DEPLOYMENT=$(curl -fsSL \
            -H "Authorization: Bearer $VERCEL_TOKEN" \
            "https://api.vercel.com/v13/deployments/$URL_HOST")

          DEPLOYMENT_ID=$(echo "$DEPLOYMENT" | jq -r '.id // empty')

          if [[ -z "$DEPLOYMENT_ID" ]]; then
            echo "Could not resolve deployment ID from Vercel API."
            {
              echo "logs<<ENDOFLOG"
              echo "No logs available — could not resolve deployment ID from URL: $TARGET_URL"
              echo "ENDOFLOG"
            } >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "Resolved deployment ID: $DEPLOYMENT_ID"

          # Fetch build events (stdout + stderr) and keep the last ~25 kB
          LOGS=$(curl -fsSL \
            -H "Authorization: Bearer $VERCEL_TOKEN" \
            "https://api.vercel.com/v2/deployments/$DEPLOYMENT_ID/events?direction=asc&limit=2000" \
            | jq -r '.[] | select(.type == "stdout" or .type == "stderr") | .payload.text // empty' \
            | grep . \
            | tail -c 25000)

          {
            echo "logs<<ENDOFLOG"
            echo "$LOGS"
            echo "ENDOFLOG"
          } >> "$GITHUB_OUTPUT"

      - name: Post missing-token notice
        if: steps.vercel.outputs.has_token == 'false'
        uses: actions/github-script@v7
        with:
          script: |
            const sha = context.payload.deployment.sha.slice(0, 7);
            const ref = context.payload.deployment.ref;

            await github.rest.issues.create({
              owner:  context.repo.owner,
              repo:   context.repo.repo,
              title:  `🚨 Vercel build failed — ${ref} @ ${sha}`,
              body: [
                `## 🚨 Vercel deployment failed`,
                ``,
                `**Branch:** \`${ref}\`  **Commit:** \`${sha}\``,
                ``,
                `> ⚠️ Build logs could not be fetched because the \`VERCEL_TOKEN\` secret is not configured in this repository.`,
                `>`,
                `> **To fix:** Go to **Settings → Secrets and variables → Actions** and add a secret named \`VERCEL_TOKEN\` with a Vercel API token.`,
                `> You can generate a token at https://vercel.com/account/tokens`,
                ``,
                `---`,
                `> 💬 Once the secret is configured, future failures will include full build logs. You can still reply \`/fix\` and Copilot will do its best without logs.`,
              ].join('\n'),
              labels: ['vercel-failure'],
            });

      - name: Open GitHub issue with build logs
        if: steps.vercel.outputs.has_token == 'true'
        uses: actions/github-script@v7
        env:
          LOGS: ${{ steps.vercel.outputs.logs }}
        with:
          script: |
            const sha     = context.payload.deployment.sha.slice(0, 7);
            const ref     = context.payload.deployment.ref;
            const env     = context.payload.deployment.environment;
            const logUrl  = context.payload.deployment_status.log_url;
            const logs    = (process.env.LOGS || 'No logs captured.').slice(-20000);

            const body = [
              `## 🚨 Vercel deployment failed`,
              ``,
              `| | |`,
              `|---|---|`,
              `| **Environment** | \`${env}\` |`,
              `| **Branch / ref** | \`${ref}\` |`,
              `| **Commit** | \`${sha}\` |`,
              `| **Vercel dashboard** | [View logs on Vercel](${logUrl}) |`,
              ``,
              `### Build output (last ~20 kB)`,
              ``,
              '```',
              logs,
              '```',
              ``,
              `---`,
              `> 💬 Reply \`/fix\` on this issue and GitHub Copilot will analyse the logs above and suggest a fix.`,
            ].join('\n');

            await github.rest.issues.create({
              owner:  context.repo.owner,
              repo:   context.repo.repo,
              title:  `🚨 Vercel build failed — ${ref} @ ${sha}`,
              body,
              labels: ['vercel-failure'],
            });

  # ───────────────────────────────────────────────────────────────────────────
  # JOB 2 · "/fix" comment on a vercel-failure issue → AI fix suggestion
  # ───────────────────────────────────────────────────────────────────────────
  fix-on-request:
    name: AI Fix Suggestion (Copilot)
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'issue_comment' &&
      github.event.action == 'created' &&
      startsWith(github.event.comment.body, '/fix') &&
      contains(github.event.issue.labels.*.name, 'vercel-failure')

    steps:
      # Acknowledge the /fix request immediately with a 👀 reaction
      - name: React to comment
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.reactions.createForIssueComment({
              owner:      context.repo.owner,
              repo:       context.repo.repo,
              comment_id: context.payload.comment.id,
              content:    'eyes',
            });

      - name: Check for existing Copilot Fix Suggestion
        id: dedup
        uses: actions/github-script@v7
        with:
          script: |
            // List existing comments on this issue
            const comments = await github.paginate(github.rest.issues.listComments, {
              owner:        context.repo.owner,
              repo:         context.repo.repo,
              issue_number: context.payload.issue.number,
              per_page:     100,
            });

            // Look for a recent "🤖 Copilot Fix Suggestion" comment (last 24 h)
            const cutoff = Date.now() - 24 * 60 * 60 * 1000;
            const existing = comments.find(c =>
              c.body?.startsWith('## 🤖 Copilot Fix Suggestion') &&
              new Date(c.created_at).getTime() > cutoff
            );

            if (existing) {
              core.setOutput('skip', 'true');
              core.setOutput('existing_url', existing.html_url);
            } else {
              core.setOutput('skip', 'false');
            }

      - name: Note duplicate suggestion
        if: steps.dedup.outputs.skip == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const existingUrl = '${{ steps.dedup.outputs.existing_url }}';
            await github.rest.issues.createComment({
              owner:        context.repo.owner,
              repo:         context.repo.repo,
              issue_number: context.payload.issue.number,
              body: [
                `ℹ️ A Copilot Fix Suggestion was already posted in the last 24 hours.`,
                ``,
                `→ [Jump to the existing suggestion](${existingUrl})`,
                ``,
                `If the problem has changed, close this issue and re-run the deployment to get fresh logs, then \`/fix\` again.`,
              ].join('\n'),
            });

      - name: Analyse logs and post fix suggestion
        if: steps.dedup.outputs.skip != 'true'
        uses: actions/github-script@v7
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          MODEL_NAME: ${{ env.MODEL_NAME }}
        with:
          script: |
            const issueBody = context.payload.issue.body ?? '';

            // Extract the build log block from the issue body
            const fenceMatch = issueBody.match(/```\n([\s\S]*?)\n```/);
            const logs = (fenceMatch ? fenceMatch[1] : issueBody).slice(0, 20000);

            const model = process.env.MODEL_NAME || 'gpt-4.1';

            // Call GitHub Models (Copilot) using the built-in GITHUB_TOKEN.
            // No external API key required — models: read permission above is sufficient.
            const resp = await fetch(
              'https://models.inference.ai.azure.com/chat/completions',
              {
                method: 'POST',
                headers: {
                  Authorization:  `Bearer ${process.env.GITHUB_TOKEN}`,
                  'Content-Type': 'application/json',
                },
                body: JSON.stringify({
                  model,
                  messages: [
                    {
                      role:    'system',
                      content: [
                        'You are an expert Next.js 16 / TypeScript / Prisma developer.',
                        'The project uses Next.js App Router, React 19, Tailwind CSS v4,',
                        'Prisma with SQLite (local) / Turso libSQL (production), and OpenAI.',
                        'Analyse the provided Vercel build logs and give concise,',
                        'actionable fixes with exact file paths and code snippets.',
                        'Format your response in GitHub-flavoured Markdown.',
                        'Structure: (1) Root cause, (2) Fix (file paths + code blocks), (3) Validation steps.',
                        'Keep your answer under 800 words.',
                      ].join(' '),
                    },
                    {
                      role:    'user',
                      content:
                        'Here are the Vercel build logs for a failed deployment. ' +
                        'Identify the root cause and provide the exact code changes needed to fix it.\n\n' +
                        '```\n' + logs + '\n```',
                    },
                  ],
                  max_tokens: 2000,
                }),
              }
            );

            if (!resp.ok) {
              const err = await resp.text();
              throw new Error(`GitHub Models API error ${resp.status}: ${err}`);
            }

            const data       = await resp.json();
            const suggestion = data.choices?.[0]?.message?.content ?? 'No suggestion returned.';

            await github.rest.issues.createComment({
              owner:        context.repo.owner,
              repo:         context.repo.repo,
              issue_number: context.payload.issue.number,
              body: [
                `## 🤖 Copilot Fix Suggestion`,
                ``,
                suggestion,
                ``,
                `---`,
                `_Generated by GitHub Models (\`${model}\`) · [View run](https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})_`,
              ].join('\n'),
            });
