name: DB Migrate (Postgres)

# Runs `prisma migrate deploy` against the production Vercel Postgres database
# whenever a new migration file is added under prisma/migrations/, or manually via
# workflow_dispatch.
#
# REQUIREMENTS: two GitHub repository secrets must be set:
#   DATABASE_URL  — POSTGRES_PRISMA_URL from Vercel (pooled)
#   DIRECT_URL    — POSTGRES_URL_NON_POOLING from Vercel (direct, used for migrations)

on:
  push:
    branches: [main, master]
    paths:
      - prisma/migrations/**
      - prisma/schema.prisma
      - scripts/prod-setup.mjs
  workflow_dispatch:

concurrency:
  group: db-migrate
  cancel-in-progress: false

jobs:
  migrate:
    name: Run Postgres migrations
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run migrations
        run: node scripts/prod-setup.mjs
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DIRECT_URL: ${{ secrets.DIRECT_URL }}
